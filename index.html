<!DOCTYPE html>
<html>
<head>
<title>Web Proxy</title>

<style>

body{
background:#0f172a;
color:white;
font-family:Arial;
text-align:center;
padding-top:100px;
}

input{
width:60%;
padding:15px;
font-size:18px;
border-radius:8px;
border:none;
}

button{
padding:15px 30px;
font-size:18px;
border:none;
background:#2563eb;
color:white;
border-radius:8px;
cursor:pointer;
}

</style>

</head>

<body>

<h1>Web Proxy</h1>

<input id="url" placeholder="Enter URL">

<button onclick="go()">Go</button>

<script>

function go(){

let url=document.getElementById("url").value

if(!url.startsWith("http")){
url="https://"+url
}

window.location="/proxy?url="+encodeURIComponent(url)

}

</script>

</body>
</html>
